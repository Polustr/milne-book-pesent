  <script type="text/javascript" id="gwd-init-code">
    (function() {
      var gwdAd = document.getElementById('gwd-ad');
      function handleDomContentLoaded(event) {
        const button = document.getElementById('ZAPUSK-BUTTON-DIV');
        gsap.set(button, { pointerEvents: 'none' });
        gsap.delayedCall(0.5, () => {
          const tl = gsap.timeline({ onComplete: () => { gsap.set(button, { pointerEvents: 'auto' }); } });
          tl.fromTo(button, { y: -800, scaleY: 1.2, scaleX: 0.9 }, { y: 20, scaleY: 0.8, scaleX: 1.1, duration: 0.9, ease: 'power3.in' })
            .to(button, { y: -10, scaleY: 1.05, scaleX: 1, duration: 0.5, ease: 'power2.out' })
            .to(button, { y: 0, scaleY: 1, scaleX: 1, duration: 0.5, ease: 'power1.out' });
        });
      }
      function handleWebComponentsReady(event) {
        requestAnimationFrame(function() { setTimeout(function() { gwdAd.initAd(); }, 1); });
      }
      function handleAdInitialized(event) {}
      window.addEventListener('DOMContentLoaded', handleDomContentLoaded, false);
      window.addEventListener('WebComponentsReady', handleWebComponentsReady, false);
      window.addEventListener('adinitialized', handleAdInitialized, false);
    })();
  </script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/MotionPathPlugin.min.js"></script>
  
  <script>
    window.addEventListener('DOMContentLoaded', function() {
      gsap.set('#B-PLAY', { opacity: 0 }); gsap.set('#B-STOP', { opacity: 1 });
      gsap.set('#B-MUTE', { opacity: 1 }); gsap.set('#B-SOUND', { opacity: 0 });
      gsap.set(['#B-PLAY', '#B-STOP', '#B-MUTE', '#B-SOUND'], { pointerEvents: 'none' });
      gsap.set('#B-STOP', { pointerEvents: 'auto' }); gsap.set('#B-MUTE', { pointerEvents: 'auto' });
      gsap.registerPlugin(MotionPathPlugin);

      const SETTINGS = { zoomDuration: 3, wingFlapSpeed: 1, butterflyFlightDuration: 30, butterflyStartX: 960, butterflyStartY: 540, butterflyEndX: -500, butterflyEndY: -250, kiteSwayDuration: 3, kiteSwayAngle: 5, kiteFloatDuration: 8, kiteFloatDistance: 70, cloudSpeedLarge: 8, cloudSpeedSmall: 2, bannerSwayDuration: 0.4, bannerSwayAngle: 5, bannerDelay: 0.3 };
      
      const button = document.getElementById('ZAPUSK-BUTTON-DIV');
      button.addEventListener('click', () => {
        const slapSound = document.getElementById('slap-sound');
        if (slapSound) { slapSound.currentTime = 0; slapSound.play(); }
        gsap.to(button, { scale: 0.9, duration: 0.1, yoyo: true, repeat: 1 });
        startAnimation();
      });
      button.addEventListener('mouseenter', () => { gsap.to(button, { scale: 1.05, duration: 0.2 }); });
      button.addEventListener('mouseleave', () => { gsap.to(button, { scale: 1, duration: 0.2 }); });

      function startAnimation() {
        const bgSound = document.getElementById('bg-sound');
        const btnSound = document.getElementById('B-SOUND'); const btnMute = document.getElementById('B-MUTE');
        const btnPlay = document.getElementById('B-PLAY'); const btnStop = document.getElementById('B-STOP');
        
        gsap.set(btnStop, { opacity: 1 }); gsap.set(btnPlay, { opacity: 0 });
        gsap.set(btnMute, { opacity: 1 }); gsap.set(btnSound, { opacity: 0 });
        
        if (bgSound) { bgSound.volume = 0; bgSound.play(); gsap.to(bgSound, { volume: 0.5, duration: 6, ease: 'power1.inOut' }); }
        gsap.to('#dark-bg', { opacity: 0, duration: 0.5, onComplete: () => { const el = document.getElementById('dark-bg'); if (el) el.remove(); } });
        gsap.to('#ZAPUSK-BUTTON-DIV', { y: -800, duration: 0.6, ease: 'power3.in' });
        gsap.to('#ZAPUSK-BUTTON-DIV', { y: -800, scale: 0.8, duration: 0.5, ease: 'power2.in' });

        gsap.to('#BAB-F-1', { opacity: 1, duration: 0.01 }); gsap.to('#BAB-F-2', { opacity: 0, duration: 0.01 });
        gsap.set('#BUTTERFLY', { scale: 5 });
        gsap.to('#BUTTERFLY', { duration: SETTINGS.zoomDuration, scale: 1, x: SETTINGS.butterflyEndX, y: SETTINGS.butterflyEndY, ease: 'power2.inOut' });

        function flapWings() {
          function randomFlap() {
            const flaps = gsap.utils.random(1, 3, 1); const fast = gsap.utils.random(1.1, 1.4); const slow = gsap.utils.random(0.6, 0.9);
            const tl = gsap.timeline({ onComplete: () => { gsap.set('#BAB-F-1', { opacity: 1 }); gsap.set('#BAB-F-2', { opacity: 0 }); gsap.to(flightTween, { timeScale: slow, duration: 0.8, ease: 'sine.inOut' }); gsap.delayedCall(gsap.utils.random(0.8, 2.5), randomFlap); } });
            for (let i = 0; i < flaps; i++) {
              tl.set('#BAB-F-1', { opacity: 1 }).set('#BAB-F-2', { opacity: 0 }).call(() => { if (i === 0) gsap.delayedCall(0.4, () => { gsap.to(flightTween, { timeScale: fast, duration: 0.2, ease: 'sine.out' }); }); }).to({}, { duration: SETTINGS.wingFlapSpeed / 2 }).set('#BAB-F-1', { opacity: 0 }).set('#BAB-F-2', { opacity: 1 }).to({}, { duration: SETTINGS.wingFlapSpeed / 2 });
            }
          }
          randomFlap();
        }
        setTimeout(flapWings, SETTINGS.zoomDuration * 1000);

        gsap.set('#BUTTERFLY', { x: SETTINGS.butterflyEndX, y: SETTINGS.butterflyEndY });
        const flightTween = gsap.to('#BUTTERFLY', { duration: SETTINGS.butterflyFlightDuration, motionPath: { path: [{ x: SETTINGS.butterflyEndX, y: SETTINGS.butterflyEndY }, { x: SETTINGS.butterflyEndX + 1700, y: SETTINGS.butterflyEndY - 100 }, { x: SETTINGS.butterflyEndX + 400, y: SETTINGS.butterflyEndY + 400 }, { x: SETTINGS.butterflyEndX + 100, y: SETTINGS.butterflyEndY - 400 }, { x: SETTINGS.butterflyEndX - 500, y: SETTINGS.butterflyEndY - 700 }, { x: SETTINGS.butterflyEndX - 600, y: SETTINGS.butterflyEndY + 100 }, { x: SETTINGS.butterflyEndX, y: SETTINGS.butterflyEndY }], curviness: 1.7, autoRotate: true, alignOrigin: [0.9, 0.3] }, repeat: -1, ease: 'none', delay: SETTINGS.zoomDuration });

        gsap.to('#all-zmey', { duration: SETTINGS.kiteSwayDuration, rotation: SETTINGS.kiteSwayAngle, transformOrigin: '82% 25%', yoyo: true, repeat: -1, ease: 'sine.inOut' });
        gsap.to('#all-zmey', { duration: SETTINGS.kiteFloatDuration, y: SETTINGS.kiteFloatDistance, yoyo: true, repeat: -1, ease: 'sine.inOut' });
        
        const largeClouds = ['#CLOUD-1', '#CLOUD-3', '#CLOUD-4'];
        largeClouds.forEach((cloud, index) => { gsap.to(cloud, { x: "+=" + gsap.utils.random(110, 160), duration: gsap.utils.random(30, 40), ease: "sine.inOut", yoyo: true, repeat: -1, delay: index * 1.5 }); });
        
        ['#BANT-1', '#BANT-2', '#BANT-3', '#BANT-4', '#BANT-5'].forEach((bant, index) => { gsap.to(bant, { duration: SETTINGS.bannerSwayDuration, rotation: SETTINGS.bannerSwayAngle, transformOrigin: 'center center', yoyo: true, repeat: -1, ease: 'sine.inOut', delay: index * SETTINGS.bannerDelay }); });
        ['#L-T-1', '#L-T-2'].forEach((ribbon, index) => { gsap.to(ribbon, { duration: gsap.utils.random(0.8, 1.2), rotation: gsap.utils.random(6, 10), yoyo: true, repeat: -1, ease: 'sine.inOut', delay: index * 0.2 }); });
        ['#L-B-1', '#L-B-2'].forEach((ribbon, index) => { gsap.to(ribbon, { duration: gsap.utils.random(0.9, 1.4), rotation: gsap.utils.random(5, 10), yoyo: true, repeat: -1, ease: 'sine.inOut', delay: index * 0.3 }); });

        btnStop.addEventListener('click', () => { gsap.globalTimeline.pause(); if (bgSound) bgSound.pause(); btnStop.style.opacity = '0'; btnStop.style.pointerEvents = 'none'; btnPlay.style.opacity = '1'; btnPlay.style.pointerEvents = 'auto'; });
        btnPlay.addEventListener('click', () => { gsap.globalTimeline.resume(); if (bgSound) bgSound.play(); btnPlay.style.opacity = '0'; btnPlay.style.pointerEvents = 'none'; btnStop.style.opacity = '1'; btnStop.style.pointerEvents = 'auto'; });
        btnMute.addEventListener('click', () => { if (bgSound) bgSound.pause(); btnMute.style.opacity = '0'; btnMute.style.pointerEvents = 'none'; btnSound.style.opacity = '1'; btnSound.style.pointerEvents = 'auto'; });
        btnSound.addEventListener('click', () => { if (bgSound) bgSound.play(); btnSound.style.opacity = '0'; btnSound.style.pointerEvents = 'none'; btnMute.style.opacity = '1'; btnMute.style.pointerEvents = 'auto'; });
      }
    });
  </script>
